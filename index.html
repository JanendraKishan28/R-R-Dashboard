<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R&R Dashboard — Reputations & Resolutions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:      #1B2A4A;
    --navy-mid:  #243660;
    --teal:      #00838F;
    --teal-lt:   #E0F4F5;
    --red:       #C0392B;
    --red-lt:    #FDEDEB;
    --green:     #1A7A4A;
    --green-lt:  #E8F6EE;
    --gold:      #B8860B;
    --gold-lt:   #FDF6E3;
    --blue:      #2C4A7C;
    --blue-lt:   #EBF0F8;
    --slate:     #5A6B8A;
    --mist:      #F4F6FA;
    --border:    #DDE3EE;
    --white:     #FFFFFF;
    --text:      #1C2833;
    --text-soft: #5A6B8A;
    --radius:    12px;
    --shadow:    0 2px 16px rgba(27,42,74,.08);
    --shadow-lg: 0 8px 40px rgba(27,42,74,.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #EEF1F7;
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────────────────────── */
  .header {
    background: var(--navy);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,.25);
  }
  .header-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-icon {
    width: 36px; height: 36px;
    background: var(--teal);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: #fff;
    letter-spacing: -.3px;
  }
  .header-sub {
    font-size: 11px;
    color: rgba(255,255,255,.5);
    font-weight: 300;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .last-updated {
    font-size: 11px;
    color: rgba(255,255,255,.4);
    font-family: 'DM Mono', monospace;
  }

  /* ── MONTH SELECTOR ─────────────────────────────────────────────────── */
  .selector-bar {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 14px 40px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }
  .selector-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--slate);
    text-transform: uppercase;
    letter-spacing: .6px;
  }
  .month-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .month-tab {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--slate);
    cursor: pointer;
    transition: all .18s ease;
  }
  .month-tab:hover { border-color: var(--teal); color: var(--teal); }
  .month-tab.active {
    background: var(--navy);
    border-color: var(--navy);
    color: #fff;
  }
  .bookings-input-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .bookings-label { font-size: 12px; color: var(--slate); font-weight: 500; }
  .bookings-input {
    width: 100px;
    padding: 6px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--navy);
    text-align: center;
    outline: none;
    transition: border-color .15s;
  }
  .bookings-input:focus { border-color: var(--teal); }

  /* ── MAIN LAYOUT ─────────────────────────────────────────────────────── */
  .main { padding: 28px 40px 48px; max-width: 1400px; margin: 0 auto; }

  /* ── SECTION TITLES ─────────────────────────────────────────────────── */
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--navy);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
    margin-left: 8px;
  }

  /* ── KPI GRID ────────────────────────────────────────────────────────── */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 32px;
  }
  .kpi-card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 20px 20px 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: transform .15s, box-shadow .15s;
  }
  .kpi-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .kpi-card.navy::before  { background: var(--navy); }
  .kpi-card.red::before   { background: var(--red); }
  .kpi-card.blue::before  { background: var(--blue); }
  .kpi-card.gold::before  { background: var(--gold); }
  .kpi-card.teal::before  { background: var(--teal); }
  .kpi-card.green::before { background: var(--green); }
  .kpi-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: .5px;
    margin-bottom: 10px;
  }
  .kpi-value {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    line-height: 1;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .kpi-card.red   .kpi-value { color: var(--red); }
  .kpi-card.blue  .kpi-value { color: var(--blue); }
  .kpi-card.gold  .kpi-value { color: var(--gold); }
  .kpi-card.teal  .kpi-value { color: var(--teal); }
  .kpi-card.green .kpi-value { color: var(--green); }
  .kpi-sub {
    font-size: 11px;
    color: var(--text-soft);
    font-weight: 400;
  }

  /* ── TWO COLUMN ─────────────────────────────────────────────────────── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 32px; }
  @media (max-width: 900px) {
    .two-col, .three-col { grid-template-columns: 1fr; }
    .main { padding: 20px; }
    .selector-bar { padding: 12px 20px; }
    .header { padding: 0 20px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* ── PANEL ───────────────────────────────────────────────────────────── */
  .panel {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .panel-body { padding: 16px 20px; }

  /* ── TABLE ───────────────────────────────────────────────────────────── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  .data-table th {
    text-align: left;
    padding: 8px 10px;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .5px;
    color: var(--text-soft);
    border-bottom: 1.5px solid var(--border);
  }
  .data-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--mist);
    color: var(--text);
    vertical-align: middle;
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--mist); }
  .data-table td.num { font-family: 'DM Mono', monospace; text-align: right; font-size: 12px; }
  .data-table td.bold { font-weight: 600; }
  .data-table tfoot td {
    font-weight: 700;
    font-size: 12px;
    border-top: 2px solid var(--border);
    background: var(--mist);
    padding: 10px 10px;
  }

  /* ── PILL BADGES ─────────────────────────────────────────────────────── */
  .pill {
    display: inline-flex; align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .pill.red   { background: var(--red-lt);   color: var(--red); }
  .pill.green { background: var(--green-lt); color: var(--green); }
  .pill.gold  { background: var(--gold-lt);  color: var(--gold); }
  .pill.blue  { background: var(--blue-lt);  color: var(--blue); }
  .pill.teal  { background: var(--teal-lt);  color: var(--teal); }

  /* ── BAR CHART ───────────────────────────────────────────────────────── */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .bar-row:last-child { margin-bottom: 0; }
  .bar-label { font-size: 12px; color: var(--text); min-width: 190px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 8px; background: var(--mist); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width .5s cubic-bezier(.4,0,.2,1); }
  .bar-fill.navy  { background: var(--navy); }
  .bar-fill.teal  { background: var(--teal); }
  .bar-fill.red   { background: var(--red); }
  .bar-fill.gold  { background: var(--gold); }
  .bar-fill.blue  { background: var(--blue); }
  .bar-fill.green { background: var(--green); }
  .bar-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-soft); min-width: 32px; text-align: right; }
  .bar-pct   { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-soft); min-width: 40px; text-align: right; }

  /* ── FUNDS DONUT VISUAL ──────────────────────────────────────────────── */
  .funds-row {
    display: flex; align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--mist);
    gap: 10px;
    font-size: 12.5px;
  }
  .funds-row:last-child { border-bottom: none; }
  .funds-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .funds-name { flex: 1; color: var(--text); }
  .funds-count { font-family: 'DM Mono', monospace; min-width: 32px; text-align: right; color: var(--text-soft); font-size: 12px; }
  .funds-val   { font-family: 'DM Mono', monospace; min-width: 90px; text-align: right; font-size: 12px; font-weight: 500; }

  /* ── OUTSTANDING REASONS ─────────────────────────────────────────────── */
  .outstanding-item {
    padding: 10px 0;
    border-bottom: 1px solid var(--mist);
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: start;
  }
  .outstanding-item:last-child { border-bottom: none; }
  .outstanding-reason { font-size: 13px; font-weight: 600; color: var(--navy); }
  .outstanding-desc   { font-size: 11px; color: var(--text-soft); margin-top: 2px; line-height: 1.4; }
  .outstanding-count  { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--red); text-align: right; }
  .outstanding-pct    { font-size: 11px; color: var(--text-soft); text-align: right; }

  /* ── AGE METRICS ─────────────────────────────────────────────────────── */
  .age-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .age-box {
    background: var(--mist);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }
  .age-number { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--navy); }
  .age-number.warn { color: var(--red); }
  .age-label { font-size: 11px; color: var(--text-soft); font-weight: 500; margin-top: 4px; text-transform: uppercase; letter-spacing: .4px; }

  /* ── TREND FLAG ──────────────────────────────────────────────────────── */
  .trend-flag { font-size: 13px; }

  /* ── WRITE-OFF BOXES ─────────────────────────────────────────────────── */
  .writeoff-box {
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 10px;
    border-left: 4px solid;
  }
  .writeoff-box:last-child { margin-bottom: 0; }
  .writeoff-box.red   { background: var(--red-lt);   border-color: var(--red); }
  .writeoff-box.blue  { background: var(--blue-lt);  border-color: var(--blue); }
  .writeoff-box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .writeoff-box-label { font-size: 13px; font-weight: 600; }
  .writeoff-box.red  .writeoff-box-label { color: var(--red); }
  .writeoff-box.blue .writeoff-box-label { color: var(--blue); }
  .writeoff-box-value { font-family: 'DM Serif Display', serif; font-size: 24px; }
  .writeoff-box.red  .writeoff-box-value { color: var(--red); }
  .writeoff-box.blue .writeoff-box-value { color: var(--blue); }
  .writeoff-box-desc { font-size: 11.5px; color: var(--text-soft); line-height: 1.5; }
  .writeoff-box-meta { font-size: 11px; color: var(--text-soft); margin-top: 6px; font-family: 'DM Mono', monospace; }

  /* ── LOADING / EMPTY ─────────────────────────────────────────────────── */
  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 300px;
    color: var(--text-soft);
    font-size: 14px;
    gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--teal);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── TAB NAV ─────────────────────────────────────────────────────────── */
  .tab-nav {
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
    margin-bottom: 24px;
  }
  .tab-btn {
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    transition: all .15s;
  }
  .tab-btn:hover { color: var(--navy); }
  .tab-btn.active { color: var(--navy); border-bottom-color: var(--navy); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ── FEEDBACK ISSUES ─────────────────────────────────────────────────── */
  .issue-row {
    display: grid;
    grid-template-columns: 200px 60px 60px 80px 1fr;
    gap: 10px;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--mist);
    font-size: 12.5px;
  }
  .issue-row:last-child { border-bottom: none; }
  .issue-row.header { font-size: 10.5px; font-weight: 700; color: var(--text-soft); text-transform: uppercase; letter-spacing: .5px; padding-bottom: 10px; }
  .issue-name { font-weight: 500; color: var(--text); }
  .issue-num  { font-family: 'DM Mono', monospace; text-align: right; }
  .issue-bar-track { height: 6px; background: var(--mist); border-radius: 3px; }
  .issue-bar-fill  { height: 100%; border-radius: 3px; background: var(--teal); }

  /* ── ANIMATIONS ──────────────────────────────────────────────────────── */
  .fade-in { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-brand">
    <div class="header-icon">🏠</div>
    <div>
      <div class="header-title">Reputations & Resolutions</div>
      <div class="header-sub">FY26 · 4DX Monthly Report</div>
    </div>
  </div>
  <div class="header-right">
    <span class="last-updated" id="last-updated">Loading…</span>
  </div>
</header>

<!-- MONTH SELECTOR + BOOKINGS -->
<div class="selector-bar">
  <span class="selector-label">Reporting Month</span>
  <div class="month-tabs" id="month-tabs"></div>
  <div class="bookings-input-wrap">
    <span class="bookings-label">Monthly bookings:</span>
    <input class="bookings-input" type="number" id="bookings-input" value="0" min="0">
  </div>
</div>

<!-- MAIN -->
<main class="main" id="main-content">
  <div class="loading"><div class="spinner"></div> Loading dashboard data…</div>
</main>

<script>
// ── DATA LOADING ────────────────────────────────────────────────────────────
let allData = null;
let currentMonth = null;
let bookings = 0;

async function loadData() {
  try {
    const resp = await fetch('./data.json?v=' + Date.now());
    if (!resp.ok) throw new Error('Could not load data.json');
    allData = await resp.json();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date(allData.generated).toLocaleDateString('en-NZ', {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    buildMonthTabs();
    const lastMonth = allData.month_list[allData.month_list.length - 1];
    selectMonth(lastMonth.key);
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="loading" style="color:#c0392b">⚠️ Could not load data.json — ${e.message}</div>`;
  }
}

function buildMonthTabs() {
  const wrap = document.getElementById('month-tabs');
  wrap.innerHTML = '';
  allData.month_list.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'month-tab';
    btn.textContent = m.label;
    btn.dataset.key = m.key;
    btn.onclick = () => selectMonth(m.key);
    wrap.appendChild(btn);
  });
}

function selectMonth(key) {
  currentMonth = key;
  document.querySelectorAll('.month-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.key === key);
  });
  renderDashboard();
}

document.getElementById('bookings-input').addEventListener('input', e => {
  bookings = parseInt(e.target.value) || 0;
  renderDashboard();
});

// ── FORMATTERS ──────────────────────────────────────────────────────────────
const fmt$ = v => v === 0 ? '—' : '$' + v.toLocaleString('en-NZ', {minimumFractionDigits:2,maximumFractionDigits:2});
const fmtN = v => v === 0 ? '—' : v.toLocaleString();
const fmtPct = (n, d) => d === 0 ? '—' : (n/d*100).toFixed(1) + '%';
const trendFlag = n => n > 20 ? '<span class="pill red">🔴 Concern</span>' : n > 10 ? '<span class="pill gold">🟡 Watch</span>' : '<span class="pill green">🟢 OK</span>';

// ── MAIN RENDER ─────────────────────────────────────────────────────────────
function renderDashboard() {
  if (!allData || !currentMonth) return;
  const d = allData.months[currentMonth];
  if (!d) return;
  bookings = parseInt(document.getElementById('bookings-input').value) || 0;

  const totalClaims   = d.total_claims;
  const totalFeedback = d.total_feedback;
  const gelSpend      = d.funds.gel_funded.value;
  const writtenOff    = d.claims_funds.written_off.value;
  const ownerAbs      = d.claims_funds.owner.value;
  const guestRec      = d.claims_funds.recovered.value;
  const resolvedYes   = d.resolved_yes;
  const totalCases    = d.total_cases;
  const openClaims    = d.open_claims;

  // Resolved via GEL (from claims_funds)
  const resolvedGEL = d.claims_funds.gel_funded.count;

  const pctClaimsVsBkgs   = bookings > 0 ? fmtPct(totalClaims, bookings)   : '—';
  const pctFeedbackVsBkgs = bookings > 0 ? fmtPct(totalFeedback, bookings) : '—';
  const pctResolvedGEL    = resolvedYes > 0 ? fmtPct(resolvedGEL, resolvedYes) : '—';

  document.getElementById('main-content').innerHTML = `
    <div class="fade-in">

      <!-- HEADLINE KPIs -->
      <div class="section-title">📊 Monthly Overview — ${d.label}</div>
      <div class="kpi-grid">
        <div class="kpi-card navy">
          <div class="kpi-label">Total Cases</div>
          <div class="kpi-value">${fmtN(totalCases)}</div>
          <div class="kpi-sub">All types this month</div>
        </div>
        <div class="kpi-card red">
          <div class="kpi-label">Claims</div>
          <div class="kpi-value">${fmtN(totalClaims)}</div>
          <div class="kpi-sub">${pctClaimsVsBkgs} of bookings</div>
        </div>
        <div class="kpi-card blue">
          <div class="kpi-label">Feedback & Reviews</div>
          <div class="kpi-value">${fmtN(totalFeedback)}</div>
          <div class="kpi-sub">${pctFeedbackVsBkgs} of bookings</div>
        </div>
        <div class="kpi-card red">
          <div class="kpi-label">GEL Spend</div>
          <div class="kpi-value" style="font-size:24px">${fmt$(gelSpend)}</div>
          <div class="kpi-sub">${fmtN(d.funds.gel_funded.count)} cases absorbed</div>
        </div>
        <div class="kpi-card green">
          <div class="kpi-label">Recovered from Guests</div>
          <div class="kpi-value" style="font-size:24px">${fmt$(guestRec)}</div>
          <div class="kpi-sub">${fmtN(d.claims_funds.recovered.count)} cases</div>
        </div>
        <div class="kpi-card teal">
          <div class="kpi-label">Resolved Yes</div>
          <div class="kpi-value">${fmtN(resolvedYes)}</div>
          <div class="kpi-sub">${fmtPct(resolvedYes, totalCases)} resolution rate</div>
        </div>
      </div>

      <!-- TAB NAV -->
      <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('claims',this)">📋 Claims</button>
        <button class="tab-btn" onclick="switchTab('feedback',this)">💬 Feedback</button>
        <button class="tab-btn" onclick="switchTab('financial',this)">💰 Financial</button>
      </div>

      <!-- CLAIMS TAB -->
      <div class="tab-content active" id="tab-claims">
        ${renderClaimsTab(d, totalClaims, resolvedYes, resolvedGEL, pctClaimsVsBkgs, pctResolvedGEL)}
      </div>

      <!-- FEEDBACK TAB -->
      <div class="tab-content" id="tab-feedback">
        ${renderFeedbackTab(d, totalFeedback, pctFeedbackVsBkgs)}
      </div>

      <!-- FINANCIAL TAB -->
      <div class="tab-content" id="tab-financial">
        ${renderFinancialTab(d)}
      </div>

    </div>`;
}

// ── CLAIMS TAB ──────────────────────────────────────────────────────────────
function renderClaimsTab(d, totalClaims, resolvedYes, resolvedGEL, pctClaimsBkgs, pctResolvedGEL) {
  const openClaims = d.open_claims;
  const avgAge = d.avg_days_open;
  const oldest = d.oldest_days_open;

  // Outstanding reasons
  const reasons = d.outstanding_reasons;
  const totalOut = Object.values(reasons).reduce((a,b)=>a+b,0);
  const reasonDescs = {
    'MSP - More Info': 'Waiting on MSP quote, photos or confirmation',
    'MSP - Quote/ Book': 'Quote requested — MSP to book contractor',
    'Guest - No Response': 'Guest contacted but has not replied',
    'Guest - Push Back': 'Guest is disputing — may need escalation',
    'Owner - Need Response': 'Awaiting owner decision or quote',
    'Contractor - Booked': 'Repair booked — waiting for invoice',
    'Courier Pending (Ordered)': 'Replacement ordered — awaiting delivery',
    'New': 'Recently opened — awaiting first action',
  };

  const reasonsHtml = Object.entries(reasons)
    .sort((a,b)=>b[1]-a[1])
    .map(([s,c]) => `
      <div class="outstanding-item">
        <div>
          <div class="outstanding-reason">${s}</div>
          <div class="outstanding-desc">${reasonDescs[s]||''}</div>
        </div>
        <div class="outstanding-count">${c}</div>
        <div class="outstanding-pct">${fmtPct(c,totalOut)}</div>
      </div>`).join('') || '<div style="color:var(--text-soft);font-size:13px;padding:12px 0">No outstanding claims this month.</div>';

  // Damage types
  const dmg = d.damage_types;
  const maxDmg = Math.max(...Object.values(dmg).map(x=>x.count), 1);
  const dmgColors = ['red','gold','blue'];
  const dmgHtml = Object.entries(dmg).map(([k,v],i) => `
    <div class="bar-row">
      <div class="bar-label">${k.replace('Claim -','')}</div>
      <div class="bar-track"><div class="bar-fill ${dmgColors[i]||'teal'}" style="width:${v.count/maxDmg*100}%"></div></div>
      <div class="bar-count">${v.count}</div>
      <div class="bar-pct" style="min-width:80px;text-align:right;font-size:11px;color:var(--text-soft)">${fmt$(v.count>0?v.value/v.count:0)} avg</div>
    </div>`).join('');

  return `
    <div class="three-col" style="margin-bottom:20px">
      <div class="kpi-card red">
        <div class="kpi-label">% Bookings with Claims</div>
        <div class="kpi-value">${pctClaimsBkgs}</div>
        <div class="kpi-sub">${fmtN(totalClaims)} claims${bookings>0?' / '+fmtN(bookings)+' bookings':''}</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">% Resolved Paid by GEL</div>
        <div class="kpi-value">${pctResolvedGEL}</div>
        <div class="kpi-sub">Of ${fmtN(resolvedYes)} resolved claims, ${fmtN(resolvedGEL)} were GEL-funded</div>
      </div>
      <div class="kpi-card gold">
        <div class="kpi-label">Open Claims</div>
        <div class="kpi-value">${fmtN(openClaims)}</div>
        <div class="kpi-sub">Still pending resolution</div>
      </div>
    </div>

    <div class="two-col">
      <!-- OUTSTANDING REASONS -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">⏳ Outstanding Claims — Why Are They Open?</div>
          <div class="pill red">${fmtN(totalOut)} open</div>
        </div>
        <div class="panel-body">${reasonsHtml}</div>
      </div>

      <!-- AGE + DAMAGE -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <!-- AGE -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">⏱ Age of Open Claims</div>
          </div>
          <div class="panel-body">
            <div class="age-grid">
              <div class="age-box">
                <div class="age-number">${avgAge}</div>
                <div class="age-label">Average days open</div>
              </div>
              <div class="age-box">
                <div class="age-number warn">${oldest}</div>
                <div class="age-label">Oldest open claim</div>
              </div>
            </div>
            <div style="margin-top:12px;font-size:11.5px;color:var(--text-soft);line-height:1.6">
              Average age is across all claims created this month still marked <strong>Pending</strong>.
              Oldest reflects the single longest-running open claim in the tracker (all time if no month filter on age).
            </div>
          </div>
        </div>
        <!-- DAMAGE TYPES -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">🔨 Damage Type Focus — MSP Training</div>
          </div>
          <div class="panel-body">${dmgHtml}</div>
        </div>
      </div>
    </div>`;
}

// ── FEEDBACK TAB ────────────────────────────────────────────────────────────
function renderFeedbackTab(d, totalFeedback, pctFeedbackBkgs) {
  const ff = d.feedback_funds;
  const gelCount = ff.gel.count;
  const gelVal   = ff.gel.value;
  const gelPct   = totalFeedback > 0 ? fmtPct(gelCount, totalFeedback) : '—';

  // Issue types
  const issues = d.issue_types;
  const maxIssue = Math.max(...Object.values(issues), 1);
  const issueColors = ['navy','red','gold','blue','teal','green','navy','red','gold'];
  const issueHtml = Object.entries(issues)
    .sort((a,b)=>b[1]-a[1])
    .map(([k,v],i) => `
      <div class="bar-row">
        <div class="bar-label" title="${k}">${k}</div>
        <div class="bar-track"><div class="bar-fill ${issueColors[i%issueColors.length]}" style="width:${v/maxIssue*100}%"></div></div>
        <div class="bar-count">${v}</div>
        <div class="bar-pct">${fmtPct(v,totalFeedback)}</div>
        <div style="min-width:90px;text-align:right">${trendFlag(v)}</div>
      </div>`).join('') || '<div style="color:var(--text-soft);font-size:13px">No categorised feedback this month.</div>';

  // Funding breakdown table
  const fundRows = [
    ['⚠️ We paid (GEL)',         'red',   ff.gel.count,   ff.gel.value,   'We absorbed — review if avoidable'],
    ['🏠 Owner paid',             'blue',  ff.owner.count, ff.owner.value, 'Owner funded — positive for GEL exposure'],
    ['✂️ Split cost',             'gold',  ff.split.count, ff.split.value, 'Shared — verify split is documented'],
    ['💚 No compensation',        'teal',  ff.no_cost.count,ff.no_cost.value,'Ideal outcome — no financial cost'],
  ];

  const fundHtml = fundRows.map(([label,color,cnt,val,note]) => `
    <div class="funds-row">
      <div class="funds-dot" style="background:var(--${color})"></div>
      <div class="funds-name">${label}</div>
      <div class="funds-count">${fmtN(cnt)}</div>
      <div class="funds-val ${color==='teal'?'':''}">
        <span style="color:var(--${color})">${fmt$(val)}</span>
      </div>
      <div style="font-size:11px;color:var(--text-soft);min-width:180px;text-align:right">${note}</div>
    </div>`).join('');

  return `
    <div class="three-col" style="margin-bottom:20px">
      <div class="kpi-card blue">
        <div class="kpi-label">% Bookings with Feedback</div>
        <div class="kpi-value">${pctFeedbackBkgs}</div>
        <div class="kpi-sub">${fmtN(totalFeedback)} feedback cases</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">GEL-Funded Feedback</div>
        <div class="kpi-value">${gelPct}</div>
        <div class="kpi-sub">${fmtN(gelCount)} cases · ${fmt$(gelVal)} spent</div>
      </div>
      <div class="kpi-card teal">
        <div class="kpi-label">Owner-Funded Cases</div>
        <div class="kpi-value">${fmtN(ff.owner.count)}</div>
        <div class="kpi-sub">${fmt$(ff.owner.value)} owner funded</div>
      </div>
    </div>

    <div class="two-col">
      <!-- FUNDING BREAKDOWN -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">💰 Feedback Funding Breakdown</div>
        </div>
        <div class="panel-body">${fundHtml}</div>
      </div>

      <!-- ISSUE TYPES -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">🔍 Issues Raised — Frequency & Trend</div>
        </div>
        <div class="panel-body">
          <div style="display:grid;grid-template-columns:1fr 50px 50px 60px 90px;gap:8px;font-size:10px;font-weight:700;color:var(--text-soft);text-transform:uppercase;letter-spacing:.4px;padding-bottom:10px;border-bottom:1px solid var(--border);margin-bottom:6px">
            <span>Issue</span><span style="text-align:right">Count</span><span style="text-align:right">%</span><span></span><span style="text-align:right">Trend</span>
          </div>
          ${issueHtml}
          <div style="margin-top:12px;font-size:11px;color:var(--text-soft)">🔴 Concern >20 cases · 🟡 Watch 10–20 · 🟢 OK &lt;10</div>
        </div>
      </div>
    </div>`;
}

// ── FINANCIAL TAB ────────────────────────────────────────────────────────────
function renderFinancialTab(d) {
  const f = d.funds;
  const cf = d.claims_funds;

  // Full funds table
  const fundsRows = [
    ['✅ Guest paid',           'green', f.guest_payment.count, f.guest_payment.value],
    ['🏠 Owner paid',           'blue',  f.owner_funded.count,  f.owner_funded.value],
    ['⚠️ GEL absorbed',        'red',   f.gel_funded.count,    f.gel_funded.value],
    ['✂️ Split cost',           'gold',  f.split.count,         f.split.value],
    ['💚 No cost',              'teal',  f.no_funds.count,      f.no_funds.value],
    ['⏳ Pending recovery',     'slate', f.pending.count,        f.pending.value],
    ['❌ Written off',          'red',   f.written_off.count,   f.written_off.value],
    ['🔄 Airbnb refunded',      'blue',  f.airbnb.count,        f.airbnb.value],
    ['🛡️ Aircover claimed',     'green', f.aircover.count,      f.aircover.value],
  ];
  const totalVal = fundsRows.reduce((a,r)=>a+r[3],0);
  const totalCnt = fundsRows.reduce((a,r)=>a+r[2],0);

  const fundsHtml = fundsRows.map(([label,color,cnt,val]) => `
    <tr>
      <td><span class="pill ${color==='slate'?'teal':color}">${label}</span></td>
      <td class="num">${fmtN(cnt)}</td>
      <td class="num">${fmt$(val)}</td>
      <td class="num" style="color:var(--text-soft)">${totalCnt>0?fmtPct(cnt,totalCnt):'—'}</td>
    </tr>`).join('');

  return `
    <div class="two-col">
      <!-- FULL FUNDS TABLE -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">💰 Full Funds Status Breakdown</div>
        </div>
        <div class="panel-body" style="padding:0">
          <table class="data-table">
            <thead><tr><th>Status</th><th style="text-align:right">Cases</th><th style="text-align:right">Value</th><th style="text-align:right">% of Total</th></tr></thead>
            <tbody>${fundsHtml}</tbody>
            <tfoot><tr><td class="bold">Total</td><td class="num">${fmtN(totalCnt)}</td><td class="num">${fmt$(totalVal)}</td><td class="num">100%</td></tr></tfoot>
          </table>
        </div>
      </div>

      <!-- WRITE-OFFS + OWNER ABSORBED -->
      <div style="display:flex;flex-direction:column;gap:16px">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">❌ Write-offs & Owner-Absorbed Costs</div>
          </div>
          <div class="panel-body">
            <div class="writeoff-box red">
              <div class="writeoff-box-header">
                <div class="writeoff-box-label">❌ Written Off — Funds Not Recovered</div>
                <div class="writeoff-box-value">${fmt$(cf.written_off.value)}</div>
              </div>
              <div class="writeoff-box-desc">Money spent on claims that was never recovered from the guest. This is a true business loss — each case should be reviewed for prevention lessons.</div>
              <div class="writeoff-box-meta">${fmtN(cf.written_off.count)} cases · avg ${fmt$(cf.written_off.count>0?cf.written_off.value/cf.written_off.count:0)} per case</div>
            </div>
            <div class="writeoff-box blue">
              <div class="writeoff-box-header">
                <div class="writeoff-box-label">🏠 Owner Absorbed — No Recovery</div>
                <div class="writeoff-box-value">${fmt$(cf.owner.value)}</div>
              </div>
              <div class="writeoff-box-desc">Owner funded this cost directly. No GEL exposure, but worth monitoring — repeated owner-absorbed costs may signal relationship strain or MSP issues at that property.</div>
              <div class="writeoff-box-meta">${fmtN(cf.owner.count)} cases · avg ${fmt$(cf.owner.count>0?cf.owner.value/cf.owner.count:0)} per case</div>
            </div>
          </div>
        </div>

        <!-- RECOVERY SUMMARY -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">✅ Recovery Summary</div>
          </div>
          <div class="panel-body">
            <div class="funds-row">
              <div class="funds-dot" style="background:var(--green)"></div>
              <div class="funds-name">Recovered from guests</div>
              <div class="funds-count">${fmtN(cf.recovered.count)}</div>
              <div class="funds-val"><span style="color:var(--green);font-weight:600">${fmt$(cf.recovered.value)}</span></div>
            </div>
            <div class="funds-row">
              <div class="funds-dot" style="background:var(--red)"></div>
              <div class="funds-name">GEL spend (all cases)</div>
              <div class="funds-count">${fmtN(f.gel_funded.count)}</div>
              <div class="funds-val"><span style="color:var(--red);font-weight:600">${fmt$(f.gel_funded.value)}</span></div>
            </div>
            <div class="funds-row" style="border-bottom:none">
              <div class="funds-dot" style="background:var(--navy)"></div>
              <div class="funds-name">Net GEL exposure</div>
              <div class="funds-count">—</div>
              <div class="funds-val"><span style="color:var(--navy);font-weight:700">${fmt$(Math.max(0, f.gel_funded.value - cf.recovered.value))}</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

// ── TAB SWITCHING ────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}

// ── BOOT ────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
